# Specific assortment items per opportunity (Range Architect output)

Trailrunning:
  opportunity_label: "Trail running shoe wall + summer trail apparel"
  assortment_items:
    - category: Trail running shoes
      examples: "Salomon Speedcross, Hoka Speedgoat, On Cloudventure"
      priority: core
    - category: Hydration vest / running pack
      examples: "Salomon ADV Skin, Ultimate Direction"
      priority: core
    - category: Trail running apparel
      examples: "Lightweight shorts, merino tee, wind shell"
      priority: core
    - category: Gaiters and accessories
      examples: "Low gaiters, trail socks, headlamp"
      priority: experimental

Klettersteig:
  opportunity_label: "Via ferrata starter kit — booming in CH Alps"
  assortment_items:
