      examples: "Petzl Scorpio, Mammut Skywalker — lanyard, shock absorber, 2 carabiners"
      priority: core
    - category: Climbing helmet
      examples: "Petzl Boreo, Black Diamond Vision"
      priority: core
    - category: Harness
      examples: "Petzl Corax, Edelrid Jay — optional for some routes"
      priority: experimental
    - category: Via ferrata gloves
      examples: "Half-finger grip gloves for cable contact"
      priority: core
    - category: Starter bundle merchandising
      examples: "Helmet + set + gloves kit CHF 199–349 entry price"
      priority: core

